<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>番茄钟</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1>番茄钟</h1>

    <div id="mode" class="mode">准备开始</div>
    <div id="timer" class="timer">25:00</div>

    <div class="buttons">
      <button id="startPauseBtn">开始</button>
      <button id="skipBtn">跳过</button>
    </div>

    <p class="hint">25 分钟工作 · 5 分钟休息</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
